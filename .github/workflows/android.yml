name: Android CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.1.0"

      - name: Build debug APK
        run: gradle --no-daemon assembleDebug

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/ChromeTabList_hook.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChromeTabList_hook-apk
          path: dist/ChromeTabList_hook.apk

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ChromeTabList_hook.apk
          generate_release_notes: true
